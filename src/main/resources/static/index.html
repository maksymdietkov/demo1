<!DOCTYPE html>
<html>
<head>
    <title>Guest Book 😎</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #eee;
            text-align: center;
        }

        h1 {
            color: #00ffcc;
        }

        input {
            padding: 10px;
            width: 250px;
            border: none;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            margin-left: 5px;
            background: #00ffcc;
            border: none;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #222;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>Guest Book (Docker Edition)</h1>

<input id="text" placeholder="Say something..." />
<button onclick="addNote()">Add</button>

<ul id="notes"></ul>

<script>
    async function loadNotes() {
        const res = await fetch('/notes');
        const data = await res.json();

        const list = document.getElementById('notes');
        list.innerHTML = '';

        data.forEach(n => {
            const li = document.createElement('li');
            li.innerText = n.text;
            list.appendChild(li);
        });
    }

    async function addNote() {
        const text = document.getElementById('text').value;

        await fetch('/notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });

        document.getElementById('text').value = '';
        loadNotes();
    }

    loadNotes();
</script>

</body>
</html>
